<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Infinity Arcade – Coming Soon</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: #000;
    color: #fff;
    font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    overflow: hidden;
    position: relative;
  }

  .stars { position: fixed; inset: 0; pointer-events: none; z-index: 0; }

  .star {
    position: absolute;
    border-radius: 50%;
    background: white;
    animation: twinkle var(--d) ease-in-out infinite;
  }

  @keyframes twinkle {
    0%, 100% { opacity: 0.1; transform: scale(1); }
    50% { opacity: 0.8; transform: scale(1.2); }
  }

  .glow-ring {
    position: fixed;
    width: 600px; height: 600px;
    border-radius: 50%;
    background: radial-gradient(circle, rgba(106,0,255,0.12) 0%, transparent 70%);
    top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    pointer-events: none; z-index: 0;
    animation: pulse-glow 4s ease-in-out infinite;
  }

  @keyframes pulse-glow {
    0%, 100% { opacity: 0.6; transform: translate(-50%, -50%) scale(1); }
    50% { opacity: 1; transform: translate(-50%, -50%) scale(1.1); }
  }

  .container {
    position: relative; z-index: 1;
    display: flex; flex-direction: column;
    align-items: center;
    padding: 2rem;
    max-width: 700px; width: 100%;
    text-align: center;
  }

  .logo-wrapper {
    position: relative;
    margin-bottom: 2.5rem;
  }

  .logo-wrapper::before {
    content: '';
    position: absolute; inset: -20px;
    border-radius: 50%;
    background: radial-gradient(circle, rgba(106,0,255,0.3) 0%, transparent 70%);
    animation: logo-pulse 3s ease-in-out infinite;
  }

  @keyframes logo-pulse {
    0%, 100% { opacity: 0.5; transform: scale(0.9); }
    50% { opacity: 1; transform: scale(1.1); }
  }

  .logo {
    width: 110px; height: 110px;
    border-radius: 28px;
    position: relative; z-index: 1;
    box-shadow: 0 0 40px rgba(106,0,255,0.5), 0 0 80px rgba(106,0,255,0.2);
    animation: float 4s ease-in-out infinite;
    object-fit: cover;
  }

  @keyframes float {
    0%, 100% { transform: translateY(0px); }
    50% { transform: translateY(-10px); }
  }

  .brand-label {
    font-size: 11px; font-weight: 600;
    letter-spacing: 4px; color: #7c3aed;
    text-transform: uppercase; margin-bottom: 0.6rem;
  }

  .title {
    font-size: clamp(2.8rem, 8vw, 4.8rem);
    font-weight: 800; line-height: 1;
    letter-spacing: -2px; margin-bottom: 0.5rem;
    background: linear-gradient(135deg, #ffffff 0%, #c4b5fd 50%, #7c3aed 100%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }

  .subtitle {
    font-size: clamp(1rem, 3vw, 1.25rem);
    font-weight: 400; color: rgba(255,255,255,0.45);
    letter-spacing: 3px; text-transform: uppercase;
    margin-bottom: 3.5rem;
  }

  .divider {
    width: 60px; height: 2px;
    background: linear-gradient(90deg, transparent, #7c3aed, transparent);
    margin: 0 auto 3.5rem; border-radius: 2px;
  }

  .countdown {
    display: flex; gap: 1.5rem;
    justify-content: center;
    margin-bottom: 3.5rem;
    flex-wrap: wrap;
  }

  .time-block {
    display: flex; flex-direction: column;
    align-items: center; gap: 0.5rem;
    min-width: 80px;
  }

  .time-value {
    font-size: clamp(2.2rem, 6vw, 3.5rem);
    font-weight: 700; line-height: 1; color: #fff;
    background: rgba(255,255,255,0.04);
    border: 1px solid rgba(124,58,237,0.3);
    border-radius: 16px;
    padding: 0.7rem 1rem; min-width: 90px;
    text-align: center; position: relative; overflow: hidden;
    transition: border-color 0.3s ease;
  }

  .time-value::after {
    content: '';
    position: absolute; top: 0; left: 0; right: 0; height: 1px;
    background: linear-gradient(90deg, transparent, rgba(124,58,237,0.6), transparent);
  }

  .time-value.tick { border-color: rgba(124,58,237,0.7); }

  .time-label {
    font-size: 10px; font-weight: 500;
    letter-spacing: 2px; color: rgba(255,255,255,0.35);
    text-transform: uppercase;
  }

  .separator {
    font-size: 2.5rem; font-weight: 300;
    color: rgba(124,58,237,0.5); padding-top: 0.2rem;
    animation: blink 1s ease-in-out infinite;
  }

  @keyframes blink {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.2; }
  }

  .footer-note {
    font-size: 12px; color: rgba(255,255,255,0.2);
    letter-spacing: 1px;
  }

  .particle {
    position: fixed; pointer-events: none;
    border-radius: 50%; z-index: 0;
    animation: rise linear infinite;
  }

  @keyframes rise {
    0% { opacity: 0; transform: translateY(0) scale(0); }
    10% { opacity: 0.6; transform: translateY(-20px) scale(1); }
    90% { opacity: 0.3; }
    100% { opacity: 0; transform: translateY(-300px) scale(0.3); }
  }
</style>
</head>
<body>

<div class="stars" id="stars"></div>
<div class="glow-ring"></div>

<div class="container">
  <div class="logo-wrapper">
    <img src="infinityarcadelogo.jpg" alt="Infinity Arcade Logo" class="logo" id="logo-img">
  </div>

  <p class="brand-label">Infinity Arcade</p>
  <h1 class="title">Coming Soon</h1>
  <p class="subtitle">1 Ocak 2027 · Hazırlanıyor</p>
  <div class="divider"></div>

  <div class="countdown">
    <div class="time-block">
      <div class="time-value" id="days">000</div>
      <div class="time-label">Gün</div>
    </div>
    <div class="separator">:</div>
    <div class="time-block">
      <div class="time-value" id="hours">00</div>
      <div class="time-label">Saat</div>
    </div>
    <div class="separator">:</div>
    <div class="time-block">
      <div class="time-value" id="minutes">00</div>
      <div class="time-label">Dakika</div>
    </div>
    <div class="separator">:</div>
    <div class="time-block">
      <div class="time-value" id="seconds">00</div>
      <div class="time-label">Saniye</div>
    </div>
  </div>

  <p class="footer-note">© 2026 Infinity Arcade. Tüm hakları saklıdır.</p>
</div>

<script>
(function() {
  var target = new Date('2027-01-01T00:00:00');

  function pad(n, len) { return String(n).padStart(len || 2, '0'); }

  function update() {
    var diff = target - new Date();
    if (diff <= 0) {
      ['days','hours','minutes','seconds'].forEach(function(id) {
        document.getElementById(id).textContent = id === 'days' ? '000' : '00';
      });
      return;
    }
    var s = Math.floor(diff / 1000);
    var sec = s % 60, min = Math.floor(s/60) % 60;
    var hrs = Math.floor(s/3600) % 24, days = Math.floor(s/86400);

    document.getElementById('days').textContent = pad(days, 3);
    document.getElementById('hours').textContent = pad(hrs);
    document.getElementById('minutes').textContent = pad(min);

    var sEl = document.getElementById('seconds');
    var prev = sEl.textContent;
    var newSec = pad(sec);
    sEl.textContent = newSec;
    if (prev !== newSec) {
      sEl.classList.add('tick');
      setTimeout(function() { sEl.classList.remove('tick'); }, 200);
    }
  }

  update();
  setInterval(update, 1000);

  var canvas = document.getElementById('stars');
  for (var i = 0; i < 80; i++) {
    var s = document.createElement('div');
    s.className = 'star';
    var size = Math.random() * 2.5 + 0.5;
    s.style.cssText = 'width:'+size+'px;height:'+size+'px;left:'+(Math.random()*100)+'%;top:'+(Math.random()*100)+'%;--d:'+(Math.random()*3+2)+'s;animation-delay:'+(Math.random()*4)+'s';
    canvas.appendChild(s);
  }

  function spawnParticle() {
    var p = document.createElement('div');
    p.className = 'particle';
    var size = Math.random() * 4 + 2;
    var dur = Math.random() * 4 + 3;
    p.style.cssText = 'width:'+size+'px;height:'+size+'px;left:'+(30+Math.random()*40)+'%;bottom:35%;background:rgba(124,58,237,'+(Math.random()*0.4+0.2)+');animation-duration:'+dur+'s;animation-delay:'+(Math.random()*2)+'s';
    document.body.appendChild(p);
    setTimeout(function() { p.remove(); }, (dur+2)*1000);
  }

  for (var j = 0; j < 6; j++) setTimeout(spawnParticle, j * 800);
  setInterval(spawnParticle, 2000);

  var logoImg = document.getElementById('logo-img');
  logoImg.onerror = function() {
    this.style.display = 'none';
    var fb = document.createElement('div');
    fb.style.cssText = 'width:110px;height:110px;border-radius:28px;background:#111;border:2px solid rgba(124,58,237,0.5);display:flex;align-items:center;justify-content:center;font-size:40px;';
    fb.textContent = '∞';
    this.parentNode.appendChild(fb);
  };
})();
</script>
</body>
</html>
